<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/assets/style.css">

<style>
.player-container {
    width: 100%;
    height: 70vh;
    background: #000;
}
.player-container iframe {
    width: 100%;
    height: 100%;
    border: none;
}
#recommend {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
    padding: 15px;
}
.rec-card {
    background: #111;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: .2s;
}
.rec-card:hover { transform: scale(1.05); }
.rec-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}
.rec-title {
    font-size: 13px;
    padding: 5px;
    color: #fff;
}
</style>
</head>

<body>

<div class="player-container">
    <iframe id="videoFrame" allowfullscreen></iframe>
</div>

<h2 id="title" style="padding:15px;color:#fff;"></h2>
<p id="info" style="padding:0 15px;color:#bbb;"></p>

<h3 style="padding-left:15px;color:#fff;">Rekomendasi</h3>
<div id="recommend"></div>

<script>
const jsonURL = "/movies.json";  // file utama
const frame = document.getElementById("videoFrame");
const titleBox = document.getElementById("title");
const infoBox = document.getElementById("info");
const recommendBox = document.getElementById("recommend");

// Ambil parameter ?id=xxx
const url = new URLSearchParams(window.location.search);
const id = url.get("id");

async function loadPlayer() {
    try {
        const req = await fetch(jsonURL);
        const data = await req.json();

        // Gabungkan movie + series episode jadi 1 list untuk rekomendasi
        let flatList = [];

        data.forEach(item => {
            if (item.type === "movie") {
                flatList.push({
                    title: item.title,
                    poster: item.poster,
                    embed: item.embed,
                    genre: item.genre,
                    year: item.year,
                    type: "movie"
                });
            } else if (item.type === "series") {
                item.episodes.forEach(ep => {
                    flatList.push({
                        title: item.title + " - " + ep.ep,
                        poster: item.poster,
                        embed: ep.embed,
                        genre: item.genre,
                        year: item.year,
                        type: "episode"
                    });
                });
            }
        });

        let current = flatList[id];
        if (!current) {
            titleBox.innerHTML = "Video tidak ditemukan.";
            return;
        }

        // Tampilkan video
        frame.src = current.embed;

        // Buat informasi
        titleBox.textContent = current.title;
        infoBox.textContent = `Genre: ${current.genre} • Tahun: ${current.year}`;

        // Rekomendasi berdasarkan genre
        let rekom = flatList.filter((m, i) => i !== id && m.genre === current.genre);
        rekom = rekom.slice(0, 8); // tampilkan max 8

        let html = "";
        rekom.forEach((r, i) => {
            html += `
                <div class="rec-card" onclick="location.href='/player.html?id=${flatList.indexOf(r)}'">
                    <img src="${r.poster}">
                    <div class="rec-title">${r.title}</div>
                </div>`;
        });

        recommendBox.innerHTML = html;

    } catch (e) {
        titleBox.textContent = "Gagal memuat video.";
    }
}

loadPlayer();
</script>

</body>
</html>
