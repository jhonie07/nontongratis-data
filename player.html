<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Player - Nonton Gratis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style.css">
    
    <!-- Preconnect Adsterra -->
    <link rel="preconnect" href="https://www.highperformanceformat.com">
    <link rel="preconnect" href="https://pl29191016.profitablecpmratenetwork.com">
    <link rel="preconnect" href="https://pl29191017.profitablecpmratenetwork.com">
    
    <style>
        /* Player-specific styles */
        .player-wrapper {
            width: 100%;
            background: #000;
        }
        
        .player-box {
            width: 100%;
            height: 60vh;
            background: #000;
            position: relative;
        }
        
        .player-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        #bannerPlayer {
            margin: 15px auto;
            text-align: center;
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
        }
        
        #title {
            padding: 15px 20px 5px;
            margin: 0;
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        #info {
            padding: 0 20px 15px;
            margin: 0;
            color: #aaa;
            font-size: 14px;
            border-bottom: 1px solid #333;
        }
        
        h3 {
            padding: 0 20px;
            margin: 20px 0 10px;
            color: #e50914;
            font-size: 1.2rem;
        }
        
        #episodes {
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .episode-btn {
            background: #1a1a1a;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid #444;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .episode-btn:hover {
            background: #e50914;
            border-color: #e50914;
            transform: translateY(-2px);
        }
        
        .episode-btn.active {
            background: #e50914;
            border-color: #e50914;
        }
        
        #recommend {
            padding: 0 20px 80px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .rec-card {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            width: 140px;
            text-align: center;
            border: 1px solid #333;
            transition: transform 0.2s;
        }
        
        .rec-card:hover {
            transform: scale(1.05);
            border-color: #e50914;
        }
        
        .rec-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        
        .rec-card span {
            display: block;
            padding: 8px;
            font-size: 13px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Back button */
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid #e50914;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            z-index: 100;
            font-size: 14px;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }
        
        .back-btn:hover {
            background: #e50914;
        }
        
        /* Loading indicator */
        .loading-player {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e50914;
            font-size: 18px;
            z-index: 10;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .player-box {
                height: 40vh;
            }
            
            #title {
                font-size: 1.3rem;
            }
            
            .rec-card {
                width: 120px;
            }
            
            .rec-card img {
                height: 150px;
            }
            
            #recommend {
                padding-bottom: 100px;
            }
        }
        
        @media (max-width: 480px) {
            .player-box {
                height: 35vh;
            }
            
            .episode-btn {
                padding: 8px 15px;
                font-size: 13px;
            }
            
            .rec-card {
                width: 100px;
            }
            
            .rec-card img {
                height: 130px;
            }
        }
    </style>
</head>
<body>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="window.location.href='index.html'">← Kembali</button>

<!-- PLAYER SECTION -->
<div class="player-wrapper">
    <div class="player-box">
        <div class="loading-player">🎬 Loading video...</div>
        <iframe id="videoFrame" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture" scrolling="no"></iframe>
    </div>
</div>

<!-- ============ BANNER IKLAN ADSTERRA (ATAS PLAYER) ============ -->
<div id="bannerPlayer" class="ad-slot"></div>

<!-- INFO FILM -->
<h2 id="title">Judul Film</h2>
<p id="info">Tahun • Genre • Rating</p>

<!-- EPISODES (UNTUK SERIES) -->
<h3 id="Episode">📺 Daftar Episode</h3>
<div id="episodes"></div>

<!-- ============ BANNER IKLAN ADSTERRA (TENGAH) ============ -->
<div class="ad-container">
    <div id="bannerHome" class="ad-slot"></div>
</div>

<!-- REKOMENDASI -->
<h3 id="Rekomendasi">🎬 Rekomendasi Untukmu</h3>
<div id="recommend"></div>

<!-- ============ BANNER IKLAN ADSTERRA (BAWAH) ============ -->
<div class="ad-container">
    <div id="bannerBottom" class="ad-slot"></div>
</div>

<!-- JAVASCRIPT -->
<script src="assets/ads.js"></script>
<script src="assets/script.js"></script>

<!-- Additional player script -->
<script>
    (function() {
        // Hide loading when video loads
        const videoFrame = document.getElementById('videoFrame');
        const loadingEl = document.querySelector('.loading-player');
        
        if (videoFrame && loadingEl) {
            videoFrame.addEventListener('load', function() {
                loadingEl.style.display = 'none';
            });
            
            // Fallback: hide loading after 5 seconds
            setTimeout(() => {
                loadingEl.style.display = 'none';
            }, 5000);
        }
        
        // Handle iframe error
        videoFrame.addEventListener('error', function() {
            loadingEl.innerHTML = '❌ Gagal memuat video. <a href="javascript:location.reload()" style="color:#e50914;">Coba lagi</a>';
        });
        
        // Pastikan localStorage ada datanya
        const movieData = localStorage.getItem('currentMovie');
        if (!movieData) {
            // Redirect ke home kalau tidak ada data
            console.warn('Tidak ada data film, kembali ke home');
            // window.location.href = 'index.html';
        }
        
        console.log('✅ Player page loaded');
    })();
</script>

</body>
</html>
