<!-- Player-specific JavaScript -->
<script>
    (function() {
        'use strict';
        
        // ============ GLOBAL VARIABLES ============
        let currentMovie = null;
        let currentEpisode = null;
        let watchTimer = null;
        let watchStartTime = null;
        let videoElement = document.getElementById('videoFrame');
        let playerLoading = document.getElementById('playerLoading');
        let videoError = document.getElementById('videoError');
        
        // ============ LOAD MOVIE DATA ============
        function loadMovieData() {
            try {
                const movieData = localStorage.getItem('currentMovie');
                if (!movieData) {
                    showError('Data film tidak ditemukan');
                    return;
                }
                
                currentMovie = JSON.parse(movieData);
                console.log('📽️ Loading movie:', currentMovie.title);
                
                // Update UI
                updatePageMeta();
                updateMovieInfo();
                loadVideo();
                loadRecommendations();
                loadComments();
                checkBookmarkStatus();
                loadRating();
                trackView();
                
                // Start watch timer
                startWatchTimer();
                
            } catch (error) {
                console.error('❌ Error loading movie:', error);
                showError('Gagal memuat data film');
            }
        }
        
        // ============ UPDATE PAGE META ============
        function updatePageMeta() {
            const title = currentMovie.title || 'Nonton Film';
            const description = `Nonton ${title} subtitle Indonesia gratis. ${currentMovie.genre || ''} - ${currentMovie.year || ''}`;
            const image = currentMovie.poster || '/og-image.jpg';
            const url = window.location.href;
            const videoUrl = currentMovie.embed || '';
            
            // Title
            document.title = `Nonton ${title} - Nonton Gratis`;
            document.getElementById('pageTitle').textContent = document.title;
            document.getElementById('playerTitle').textContent = title;
            document.getElementById('movieTitle').textContent = title;
            
            // Meta tags
            document.getElementById('metaTitle').setAttribute('content', document.title);
            document.getElementById('metaDescription').setAttribute('content', description);
            document.getElementById('ogTitle').setAttribute('content', document.title);
            document.getElementById('ogDescription').setAttribute('content', description);
            document.getElementById('ogImage').setAttribute('content', image);
            document.getElementById('ogUrl').setAttribute('content', url);
            document.getElementById('twitterTitle').setAttribute('content', document.title);
            document.getElementById('twitterDescription').setAttribute('content', description);
            document.getElementById('twitterImage').setAttribute('content', image);
            document.getElementById('twitterPlayer').setAttribute('content', videoUrl);
            document.getElementById('canonicalUrl').setAttribute('href', url);
            
            // Movie meta
            document.getElementById('movieYear').textContent = `📅 ${currentMovie.year || 'N/A'}`;
            document.getElementById('movieGenre').textContent = `🎬 ${currentMovie.genre || 'Unknown'}`;
            document.getElementById('movieViews').textContent = `👁️ ${formatNumber(currentMovie.views || 0)} views`;
            document.getElementById('movieDescription').textContent = currentMovie.description || 
                `${title} - Film ${currentMovie.genre || ''} tahun ${currentMovie.year || ''}. Nonton gratis subtitle Indonesia.`;
        }
        
        // ============ UPDATE MOVIE INFO ============
        function updateMovieInfo() {
            // Show episodes if series
            if (currentMovie.type === 'series' && currentMovie.episodes) {
                document.getElementById('episodesSection').style.display = 'block';
                renderEpisodes(currentMovie.episodes);
            }
        }
        
        // ============ RENDER EPISODES ============
        function renderEpisodes(episodes) {
            const container = document.getElementById('episodesList');
            container.innerHTML = '';
            
            // Check watched episodes
            const watchedEpisodes = JSON.parse(localStorage.getItem(`watched_${currentMovie.id}`) || '[]');
            
            episodes.forEach((ep, index) => {
                const btn = document.createElement('button');
                btn.className = 'episode-btn' + (index === 0 ? ' active' : '');
                if (watchedEpisodes.includes(index)) {
                    btn.classList.add('watched');
                }
                btn.textContent = ep.ep || `Episode ${index + 1}`;
                btn.onclick = () => {
                    // Update active state
                    document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Change video
                    currentEpisode = ep;
                    changeVideo(ep.embed);
                    
                    // Mark as watched
                    markEpisodeWatched(index);
                };
                container.appendChild(btn);
            });
            
            // Set first episode as current
            if (episodes[0]) {
                currentEpisode = episodes[0];
            }
        }
        
        // ============ MARK EPISODE WATCHED ============
        function markEpisodeWatched(episodeIndex) {
            const key = `watched_${currentMovie.id}`;
            const watched = JSON.parse(localStorage.getItem(key) || '[]');
            if (!watched.includes(episodeIndex)) {
                watched.push(episodeIndex);
                localStorage.setItem(key, JSON.stringify(watched));
            }
        }
        
        // ============ LOAD VIDEO ============
        function loadVideo() {
            let embedUrl = currentMovie.embed;
            
            if (currentMovie.type === 'series' && currentMovie.episodes && currentMovie.episodes[0]) {
                embedUrl = currentMovie.episodes[0].embed;
            }
            
            if (!embedUrl) {
                showError('URL video tidak tersedia');
                return;
            }
            
            // Convert to embed format if needed
            if (embedUrl.includes('dailymotion.com/video/')) {
                const videoId = embedUrl.split('/video/')[1].split('?')[0];
                embedUrl = `https://www.dailymotion.com/embed/video/${videoId}`;
            }
            
            videoElement.src = embedUrl + '?autoplay=1&mute=0';
            
            // Handle video events
            videoElement.onload = () => {
                playerLoading.style.display = 'none';
                videoError.style.display = 'none';
            };
            
            videoElement.onerror = () => {
                showError('Gagal memuat video dari server ini');
            };
            
            // Hide loading after 5 seconds (fallback)
            setTimeout(() => {
                playerLoading.style.display = 'none';
            }, 5000);
        }
        
        // ============ CHANGE VIDEO ============
        function changeVideo(url) {
            playerLoading.style.display = 'flex';
            videoError.style.display = 'none';
            
            if (url.includes('dailymotion.com/video/')) {
                const videoId = url.split('/video/')[1].split('?')[0];
                url = `https://www.dailymotion.com/embed/video/${videoId}`;
            }
            
            videoElement.src = url + '?autoplay=1';
        }
        
        // ============ SWITCH SERVER ============
        window.switchServer = function() {
            // Simulate server switch
            alert('Mencoba server lain...');
            loadVideo();
        };
        
        // ============ SHOW ERROR ============
        function showError(message) {
            playerLoading.style.display = 'none';
            videoError.style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }
        
        // ============ START WATCH TIMER ============
        function startWatchTimer() {
            watchStartTime = Date.now();
            
            watchTimer = setInterval(() => {
                const elapsed = Math.floor((Date.now() - watchStartTime) / 1000);
                
                // Save progress every 10 seconds
                if (elapsed % 10 === 0) {
                    saveWatchProgress(elapsed);
                }
                
                // Mark as completed if watched > 80%
                const duration = currentMovie.duration || 7200; // Default 2 hours
                if (elapsed > duration * 0.8) {
                    markAsCompleted();
                }
            }, 1000);
        }
        
        // ============ SAVE WATCH PROGRESS ============
        function saveWatchProgress(seconds) {
            const history = JSON.parse(localStorage.getItem('watch_history') || '[]');
            const existing = history.findIndex(h => h.id === currentMovie.id);
            
            const entry = {
                id: currentMovie.id,
                title: currentMovie.title,
                poster: currentMovie.poster,
                type: currentMovie.type,
                progress: seconds,
                timestamp: Date.now()
            };
            
            if (existing >= 0) {
                history[existing] = entry;
            } else {
                history.push(entry);
            }
            
            // Keep only last 20 items
            const trimmed = history.slice(-20);
            localStorage.setItem('watch_history', JSON.stringify(trimmed));
        }
        
        // ============ MARK AS COMPLETED ============
        function markAsCompleted() {
            const completed = JSON.parse(localStorage.getItem('completed_movies') || '[]');
            if (!completed.includes(currentMovie.id)) {
                completed.push(currentMovie.id);
                localStorage.setItem('completed_movies', JSON.stringify(completed));
            }
        }
        
        // ============ TRACK VIEW ============
        function trackView() {
            // Increment view count
            currentMovie.views = (currentMovie.views || 0) + 1;
            
            // Save to localStorage for demo
            const views = JSON.parse(localStorage.getItem('movie_views') || '{}');
            views[currentMovie.id] = (views[currentMovie.id] || 0) + 1;
            localStorage.setItem('movie_views', JSON.stringify(views));
            
            // Update display
            document.getElementById('movieViews').textContent = `👁️ ${formatNumber(currentMovie.views)} views`;
        }
        
        // ============ CHECK BOOKMARK STATUS ============
        function checkBookmarkStatus() {
            const bookmarks = JSON.parse(localStorage.getItem('nontongratis_bookmarks') || '[]');
            const isBookmarked = bookmarks.some(b => b.id === currentMovie.id || b.title === currentMovie.title);
            
            const btn = document.getElementById('bookmarkBtn');
            if (isBookmarked) {
                btn.classList.add('active');
                btn.querySelector('span:first-child').textContent = '🔖';
            } else {
                btn.classList.remove('active');
                btn.querySelector('span:first-child').textContent = '🔖';
            }
        }
        
        // ============ BOOKMARK TOGGLE ============
        document.getElementById('bookmarkBtn').addEventListener('click', () => {
            const bookmarks = JSON.parse(localStorage.getItem('nontongratis_bookmarks') || '[]');
            const index = bookmarks.findIndex(b => b.id === currentMovie.id || b.title === currentMovie.title);
            
            const btn = document.getElementById('bookmarkBtn');
            
            if (index >= 0) {
                bookmarks.splice(index, 1);
                btn.classList.remove('active');
                btn.querySelector('span:first-child').textContent = '🔖';
                showToast('Dihapus dari bookmark');
            } else {
                bookmarks.push({
                    id: currentMovie.id,
                    type: currentMovie.type,
                    title: currentMovie.title,
                    poster: currentMovie.poster,
                    genre: currentMovie.genre,
                    year: currentMovie.year,
                    embed: currentMovie.embed,
                    episodes: currentMovie.episodes
                });
                btn.classList.add('active');
                btn.querySelector('span:first-child').textContent = '🔖';
                showToast('Ditambahkan ke bookmark');
            }
            
            localStorage.setItem('nontongratis_bookmarks', JSON.stringify(bookmarks));
        });
        
        // ============ LOAD RECOMMENDATIONS ============
        async function loadRecommendations() {
            const container = document.getElementById('recommendationsList');
            
            try {
                // Try to fetch from movies.json
                const response = await fetch('/movies.json');
                const data = await response.json();
                
                const filtered = data.filter(item => 
                    item.title !== currentMovie.title && 
                    (item.genre === currentMovie.genre || item.type === currentMovie.type)
                );
                
                const random = filtered.sort(() => 0.5 - Math.random()).slice(0, 4);
                
                container.innerHTML = '';
                random.forEach(item => {
                    const card = createRecommendationCard(item);
                    container.appendChild(card);
                });
                
            } catch (error) {
                // Fallback recommendations
                container.innerHTML = '<p style="color: #aaa;">Loading recommendations...</p>';
            }
        }
        
        // ============ CREATE RECOMMENDATION CARD ============
        function createRecommendationCard(item) {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => {
                localStorage.setItem('currentMovie', JSON.stringify(item));
                window.location.reload();
            };
            
            card.innerHTML = `
                <img src="${item.poster || '/placeholder.jpg'}" alt="${item.title}" loading="lazy">
                <div class="movie-info">
                    <h3>${item.title}</h3>
                    <p>${item.year || ''} • ${item.genre || ''}</p>
                </div>
            `;
            
            return card;
        }
        
        // ============ LOAD COMMENTS ============
        function loadComments() {
            const comments = JSON.parse(localStorage.getItem(`comments_${currentMovie.id}`) || '[]');
            const container = document.getElementById('commentsList');
            const countEl = document.getElementById('commentCount');
            
            countEl.textContent = comments.length;
            
            if (comments.length === 0) {
                container.innerHTML = '<p style="color: #aaa; text-align: center; padding: 20px;">Belum ada komentar. Jadilah yang pertama!</p>';
                return;
            }
            
            container.innerHTML = '';
            comments.slice(-10).reverse().forEach(comment => {
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `
                    <div class="comment-avatar">${comment.author.charAt(0).toUpperCase()}</div>
                    <div class="comment-content">
                        <div class="comment-header">
                            <span class="comment-author">${comment.author}</span>
                            <span class="comment-time">${formatTime(comment.timestamp)}</span>
                        </div>
                        <div class="comment-text">${escapeHtml(comment.text)}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        // ============ SUBMIT COMMENT ============
        document.getElementById('submitComment').addEventListener('click', () => {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            
            if (!text) {
                alert('Tulis komentar terlebih dahulu');
                return;
            }
            
            const comments = JSON.parse(localStorage.getItem(`comments_${currentMovie.id}`) || '[]');
            
            comments.push({
                author: 'Anonim',
                text: text,
                timestamp: Date.now()
            });
            
            localStorage.setItem(`comments_${currentMovie.id}`, JSON.stringify(comments));
            
            input.value = '';
            loadComments();
            showToast('Komentar terkirim!');
        });
        
        // ============ LOAD RATING ============
        function loadRating() {
            const ratings = JSON.parse(localStorage.getItem(`ratings_${currentMovie.id}`) || '{"total":0,"count":0,"userRating":0}');
            const avg = ratings.count > 0 ? ratings.total / ratings.count : 0;
            
            updateStars(ratings.userRating);
            document.getElementById('ratingCount').textContent = `(${ratings.count})`;
        }
        
        // ============ UPDATE STARS ============
        function updateStars(rating) {
            const stars = document.querySelectorAll('.star');
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.textContent = '★';
                    star.classList.add('active');
                } else {
                    star.textContent = '☆';
                    star.classList.remove('active');
                }
            });
        }
        
        // ============ RATING STARS CLICK ============
        document.querySelectorAll('.star').forEach((star, index) => {
            star.addEventListener('click', () => {
                const rating = index + 1;
                const ratings = JSON.parse(localStorage.getItem(`ratings_${currentMovie.id}`) || '{"total":0,"count":0,"userRating":0}');
                
                // Remove old rating if exists
                if (ratings.userRating > 0) {
                    ratings.total -= ratings.userRating;
                    ratings.count--;
                }
                
                // Add new rating
                ratings.total += rating;
                ratings.count++;
                ratings.userRating = rating;
                
                localStorage.setItem(`ratings_${currentMovie.id}`, JSON.stringify(ratings));
                
                updateStars(rating);
                document.getElementById('ratingCount').textContent = `(${ratings.count})`;
                showToast(`Kamu memberi rating ${rating} bintang!`);
            });
        });
        
        // ============ SHARE FUNCTIONS ============
        document.getElementById('shareBtn').addEventListener('click', () => {
            document.getElementById('shareModal').classList.add('active');
            document.getElementById('shareUrlInput').value = window.location.href;
        });
        
        window.closeShareModal = () => {
            document.getElementById('shareModal').classList.remove('active');
        };
        
        window.copyShareUrl = () => {
            const input = document.getElementById('shareUrlInput');
            input.select();
            document.execCommand('copy');
            showToast('Link disalin!');
        };
        
        document.querySelectorAll('.share-btn, .share-platform').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const platform = e.target.dataset.platform;
                const url = encodeURIComponent(window.location.href);
                const title = encodeURIComponent(`Nonton ${currentMovie.title} di Nonton Gratis`);
                
                let shareUrl = '';
                switch(platform) {
                    case 'whatsapp':
                        shareUrl = `https://wa.me/?text=${title}%20${url}`;
                        break;
                    case 'telegram':
                        shareUrl = `https://t.me/share/url?url=${url}&text=${title}`;
                        break;
                    case 'facebook':
                        shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
                        break;
                    case 'twitter':
                        shareUrl = `https://twitter.com/intent/tweet?url=${url}&text=${title}`;
                        break;
                    case 'copy':
                        navigator.clipboard.writeText(window.location.href);
                        showToast('Link disalin!');
                        return;
                }
                
                if (shareUrl) {
                    window.open(shareUrl, '_blank');
                }
            });
        });
        
        // ============ FULLSCREEN ============
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            const wrapper = document.getElementById('videoWrapper');
            if (wrapper.requestFullscreen) {
                wrapper.requestFullscreen();
            }
        });
        
        // ============ REPORT BUTTON ============
        document.getElementById('reportBtn').addEventListener('click', () => {
            const reason = prompt('Kenapa video ini error? (Opsional)');
            const reports = JSON.parse(localStorage.getItem('video_reports') || '[]');
            reports.push({
                movieId: currentMovie.id,
                title: currentMovie.title,
                reason: reason || 'Tidak disebutkan',
                timestamp: Date.now()
            });
            localStorage.setItem('video_reports', JSON.stringify(reports));
            showToast('Terima kasih! Laporan kamu telah dikirim.');
        });
        
        // ============ HELPER FUNCTIONS ============
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function formatTime(timestamp) {
            const diff = Date.now() - timestamp;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return 'Baru saja';
            if (minutes < 60) return `${minutes} menit lalu`;
            if (hours < 24) return `${hours} jam lalu`;
            return `${days} hari lalu`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(message) {
            // Simple toast
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 80px;
                left: 50%;
                transform: translateX(-50%);
                background: #e50914;
                color: white;
                padding: 12px 24px;
                border-radius: 30px;
                z-index: 9999;
                font-weight: bold;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }
        
        // ============ CLEANUP ON UNLOAD ============
        window.addEventListener('beforeunload', () => {
            if (watchTimer) {
                clearInterval(watchTimer);
            }
        });
        
        // ============ INIT ============
        loadMovieData();
        
        // Expose to window
        window.currentMovie = currentMovie;
        
        console.log('✅ Player page loaded with all features');
    })();
</script>
