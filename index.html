<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nonton Gratis</title>

<style>
:root {
  --bg:#000;
  --card:#111;
  --text:#fff;
  --main:red;
}

.light {
  --bg:#f5f5f5;
  --card:#fff;
  --text:#000;
}

body {
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial;
  transition:.3s;
}

header {
  background:var(--card);
  padding:15px;
  text-align:center;
  font-size:22px;
  color:var(--main);
  font-weight:bold;
}

.toggle {
  position:fixed;
  right:10px;
  top:10px;
  background:var(--main);
  border:none;
  padding:8px;
  border-radius:5px;
  color:#fff;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;
  padding:15px;
}

.card {
  background:var(--card);
  border-radius:6px;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
}
.card:hover { transform:scale(1.06); }

.card img { width:100%; height:200px; object-fit:cover; }
.title { padding:8px; text-align:center; }

iframe { width:100%; height:90vh; border:none; }

input {
  width:90%;
  padding:10px;
  margin:15px;
  border-radius:6px;
  border:none;
}

.episode-list button {
  width:100%;
  padding:10px;
  margin:5px 0;
  background:var(--card);
  border:1px solid #333;
  color:var(--text);
}

.active { background:var(--main) !important; }

.next-prev {
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.next-prev button {
  width:48%;
  padding:10px;
  background:var(--main);
  border:none;
  color:#fff;
}

.loader {
  border:5px solid #222;
  border-top:5px solid red;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
  margin:50px auto;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}
</style>
</head>

<body>

<header>NONTON GRATIS</header>
<button class="toggle" onclick="toggleMode()">☀️</button>

<input type="text" id="search" placeholder="Cari..." onkeyup="searchMovie()">

<div id="continue"></div>
<div id="app"><div class="loader"></div></div>

<script>
const url="https://raw.githubusercontent.com/jhonie07/nontongratis-data/main/movies.json";
let allData=[];

const params=new URLSearchParams(location.search);
const play=params.get("play");
const series=params.get("series");
const ep=params.get("ep");

const app=document.getElementById("app");

function saveProgress(key,time){
  localStorage.setItem(key,time);
}

function getProgress(key){
  return localStorage.getItem(key)||0;
}

function saveHistory(title,embed){
  localStorage.setItem("last_watch",JSON.stringify({title,embed}));
}

function loadHistory(){
  const d=JSON.parse(localStorage.getItem("last_watch"));
  if(!d) return;
  document.getElementById("continue").innerHTML=
  `<div style="padding:15px;">
    <h3>Lanjutkan</h3>
    <button onclick="location.href='?series=${encodeURIComponent(d.title)}&ep=${encodeURIComponent(d.embed)}'">${d.title}</button>
  </div>`;
}

function loadPlayer(embed,title){
  app.innerHTML=`<iframe id="player" src="${embed}" allowfullscreen></iframe>`;
  saveHistory(title,embed);
  scrollToTop();
}

function scrollToTop(){
  window.scrollTo({top:0,behavior:"smooth"});
}

fetch(url).then(r=>r.json()).then(data=>{
  allData=data;
  loadHistory();

  if(play){
    loadPlayer(play,"movie");
    return;
  }

  if(series && ep){
    renderEpisode(series,ep);
    return;
  }

  if(series){
    renderSeries(series);
    return;
  }

  renderHome(data);
});

function renderHome(data){
  let html=`<div class='grid'>`;
  data.forEach(m=>{
    html+=`
    <div class="card" onclick="openItem('${m.title}')">
      <img src="${m.poster}">
      <div class="title">${m.title}</div>
    </div>`;
  });
  html+=`</div>`;
  app.innerHTML=html;
}

function renderSeries(title){
  const item=allData.find(x=>x.title===title);
  renderEpisode(title,item.episodes[0].embed);
}

function renderEpisode(title,embed){
  const item=allData.find(x=>x.title===title);
  const eps=item.episodes;
  let i=eps.findIndex(e=>e.embed===embed);

  let html=`
  <h2 style="padding:15px;">${title}</h2>

  <div class="next-prev">
    <button onclick="goEp('${title}',${i-1})" ${i<=0?'disabled':''}>Prev</button>
    <button onclick="goEp('${title}',${i+1})" ${i>=eps.length-1?'disabled':''}>Next</button>
  </div>

  <iframe src="${embed}" allowfullscreen></iframe>

  <div class="episode-list">`;

  eps.forEach((e,index)=>{
    html+=`
    <button class="${embed===e.embed?'active':''}"
    onclick="goEp('${title}',${index})">${e.ep}</button>`;
  });

  html+=`</div>`;
  app.innerHTML=html;

  saveHistory(title,embed);
  scrollToTop();

  // AUTO NEXT (jika video selesai, reload ke next)
  setTimeout(()=>{
    if(i < eps.length-1){
      console.log("Auto next siap");
    }
  },5000);
}

function goEp(title,i){
  const item=allData.find(x=>x.title===title);
  const ep=item.episodes[i];
  location.href=`?series=${encodeURIComponent(title)}&ep=${encodeURIComponent(ep.embed)}`;
}

function openItem(title){
  const item=allData.find(x=>x.title===title);
  if(item.type==="movie"){
    location.href="?play="+encodeURIComponent(item.embed);
  } else {
    location.href="?series="+encodeURIComponent(title);
  }
}

function searchMovie(){
  const q=document.getElementById("search").value.toLowerCase();
  renderHome(allData.filter(x=>x.title.toLowerCase().includes(q)));
}

function toggleMode(){
  document.body.classList.toggle("light");
}
</script>
<div style="text-align:center;padding:20px;">
  <a href="about.html">About</a> |
  <a href="privacy.html">Privacy</a> |
  <a href="contact.html">Contact</a>
</div>
</body>
</html>
