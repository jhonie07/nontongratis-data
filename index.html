<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Nonton Gratis - Streaming Film Sub Indo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style.css">
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://www.highperformanceformat.com">
    <link rel="preconnect" href="https://pl29191016.profitablecpmratenetwork.com">
    <link rel="preconnect" href="https://pl29191017.profitablecpmratenetwork.com">
</head>
<body>

<!-- HEADER -->
<header>
    <h1 class="logo">🎬 NONTON GRATIS</h1>
    <input type="text" id="search" placeholder="🔍 Cari film...">
</header>

<!-- ============ HERO VIDEO SECTION (DINAMIS) ============ -->
<section id="hero">
    <div class="hero-video-wrapper">
        <iframe 
            id="heroVideo"
            src="" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
        <div class="hero-overlay">
            <h2 id="heroTitle">🔥 SEDANG TRENDING</h2>
            <p id="heroInfo">Loading...</p>
            <button class="hero-btn" id="heroWatchBtn">▶ Tonton Sekarang</button>
        </div>
    </div>
</section>

<!-- ============ BANNER IKLAN ATAS ============ -->
<div class="ad-container">
    <div id="bannerTop" class="ad-slot"></div>
</div>

<!-- ============ KATEGORI ============ -->
<h2 class="section-title">📂 Kategori</h2>
<div id="categories"></div>

<!-- ============ FILM TERBARU ============ -->
<h2 class="section-title">🎥 Film Terbaru</h2>
<div id="movies"></div>

<!-- ============ BANNER IKLAN TENGAH ============ -->
<div class="ad-container">
    <div id="bannerHome" class="ad-slot"></div>
</div>

<!-- ============ SERIES TERBARU ============ -->
<h2 class="section-title">📺 Series Terbaru</h2>
<div id="series"></div>

<!-- ============ BANNER IKLAN BAWAH ============ -->
<div class="ad-container">
    <div id="bannerBottom" class="ad-slot"></div>
</div>

<!-- MODAL DETAIL -->
<div id="modal" class="modal">
    <div class="modal-content" id="modalBody"></div>
</div>

<!-- LOADING -->
<div id="loading">⏳ Loading...</div>

<!-- JAVASCRIPT -->
<script src="assets/ads.js"></script>
<script src="assets/script.js"></script>

</body>
</html>
