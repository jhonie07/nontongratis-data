<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nonton Gratis</title>

<!-- SEO -->
<meta name="description" content="Nonton film gratis full HD. Streaming mudah, cepat, anti ribet.">
<meta name="keywords" content="nonton film gratis, streaming film, movie online, film indo, film terbaru">
<meta name="robots" content="index,follow"/>

<style>
body{
  background:#000;
  color:#fff;
  margin:0;
  font-family:Arial;
}

header{
  padding:15px;
  font-size:24px;
  font-weight:bold;
  text-align:center;
  background:#111;
  color:#e50914;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
  padding:15px;
}

.card{
  background:#111;
  border-radius:6px;
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
}

.card:hover{ transform:scale(1.05); }

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.title{
  padding:8px;
  text-align:center;
  font-size:14px;
  height:45px;
  color:#fff;
}
</style>
</head>
<body>

<header>NONTON GRATIS</header>

<div id="movieList">Memuat...</div>

<script>
async function loadMovies(){
  const url = "https://raw.githubusercontent.com/jhonie07/nontongratis-data/refs/heads/main/movies.json";

  try{
    const res = await fetch(url);
    const data = await res.json();

    let html = "<div class='grid'>";

    data.forEach(m=>{
      html += `
        <div class='card' onclick="location.href='player.html?url=${encodeURIComponent(m.embed)}'">
          <img src="${m.poster}" />
          <div class='title'>${m.title}</div>
        </div>
      `;
    });

    html += "</div>";

    document.getElementById("movieList").innerHTML = html;

  }catch(e){
    document.getElementById("movieList").innerHTML = "Gagal memuat data film!";
  }
}

loadMovies();
</script>

</body>
</html>
